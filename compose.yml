# Networks for communication between services
networks:
  caddy:
    driver: bridge

# Volumes
volumes:
  caddy_data:
  caddy_config:
  dns-logs:
  dns-config:
  portainer_data:

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # Default Gunicorn timeout is 30s; with a single sync worker, any slow client/connection can
      # trigger WORKER TIMEOUT and make the container look like it's "crashing".
      GUNICORN_CMD_ARGS: "--workers 2 --worker-class gthread --threads 4 --bind 0.0.0.0:5000 --timeout 60 --graceful-timeout 30 --keep-alive 2 --access-logfile - --error-logfile -"
    restart: unless-stopped
    networks:
      - caddy
    healthcheck:
      test: [ "CMD-SHELL", "test ! -f /tmp/drain && curl -f http://localhost:5000/ping" ]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s


#  portainer:
#    image: portainer/portainer-ce:alpine
#    restart: unless-stopped
#    networks:
#      - caddy
#    volumes:
#      - /var/run/docker.sock:/var/run/docker.sock
#      - portainer_data:/data
#    healthcheck:
#      test: [ "CMD", "wget", "--no-verbose", "--no-check-certificate", "--tries=1", "--spider", "https://localhost:9443" ]
#      interval: 30s
#      timeout: 5s
#      retries: 3
#      start_period: 5s
#    ports:
#      - 9443:9443
#      - 8000:8000


  lazydocker:
    image: dhimanparas20/lazydocker-web:latest
    container_name: lazydocker
    restart: unless-stopped
    networks:
      - caddy
    ports:
      - "7681:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
#      - /run/user/1000/docker.sock:/var/run/docker.sock


  # Caddy server for reverse proxying and HTTPS
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - LOGS_DOMAIN=${LOGS_DOMAIN}
    ports:
      - "80:80"       # HTTP (will be redirected to HTTPS)
      - "443:443"     # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - caddy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "80" ]
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 10s


  ddns:
    image: dhimanparas20/ddns:latest
    container_name: ddns
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Calcutta
#      FREEDNS_UPDATE_URL: ${FREEDNS_UPDATE_URL}
      # Optional alternative to FREEDNS_UPDATE_URL:
      FREEDNS_TOKEN: ${FREEDNS_TOKEN}
      UPDATE_INTERVAL: 1
      FREEDNS_REQUEST_TIMEOUT_SECONDS: 15
      FREEDNS_CONNECT_TIMEOUT_SECONDS: 8
      FREEDNS_RETRY_COUNT: 1
      FREEDNS_FORCE_IPV4: 1
      FREEDNS_ALLOW_HTTP_FALLBACK: 1
      FORCE_UPDATE_EACH_CYCLE: 0
    volumes:
      - dns-logs:/var/log/freedns
      - dns-config:/etc/freedns
