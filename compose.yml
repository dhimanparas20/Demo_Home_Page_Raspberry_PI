# Networks for communication between services
networks:
  caddy:
    driver: bridge

# Volumes
volumes:
  caddy_data:
  caddy_config:
  dns-logs:
  dns-config:
  portainer_data:

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
#    environment:
#      - GUNICORN_CMD_ARGS="--workers 1 --bind 0.0.0.0:5000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/ping')" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - caddy


  portainer:
    image: portainer/portainer-ce:alpine
    restart: unless-stopped
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--no-check-certificate", "--tries=1", "--spider", "https://localhost:9443" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - 9443:9443
      - 8000:8000


  lazydocker:
    image: dhimanparas20/lazydocker-web:latest
    container_name: lazydocker
    restart: unless-stopped
    networks:
      - caddy
    ports:
      - ":7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./lazydocker-web/config.yml:/root/.config/lazydocker/config.yml
      # - /run/user/1000/docker.sock:/var/run/docker.sock


  # Caddy server for reverse proxying and HTTPS
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    environment:
      - WEB_DOMAIN=mst.evils.in
    ports:
      - "80:80"       # HTTP (will be redirected to HTTPS)
      - "443:443"     # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - caddy
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "80" ]
      interval: 2m
      timeout: 5s
      retries: 3
      start_period: 10s


  ddns:
    image: dhimanparas20/ddns:latest
    container_name: ddns
    restart: always
    environment:
      - TZ=Asia/Kolkata
      - FREEDNS_TOKEN=your_token_here
      - UPDATE_INTERVAL=1
    volumes:
      - dns-logs:/var/log/freedns
      - dns-config:/etc/freedns
